---
layout: default
---

<article class="single-post">
    <header class="post-header">
        {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-featured-image">
        {% endif %}
        
        {% if page.category %}
        <span class="post-category">{{ page.category }}</span>
        {% endif %}
        
        <h1 class="post-title">{{ page.title }}</h1>
        
        <div class="post-meta">
            <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
            {% if page.author %}
            <span class="post-author">by {{ page.author }}</span>
            {% endif %}
        </div>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <!-- Share Buttons -->
    <div class="share-buttons">
        <h3>Share this article:</h3>
        <a href="https://wa.me/?text={{ page.title }} - {{ site.url }}{{ page.url }}" target="_blank" class="share-btn whatsapp">
            WhatsApp
        </a>
        <a href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ site.url }}{{ page.url }}" target="_blank" class="share-btn twitter">
            Twitter
        </a>
    </div>
</article>
